name: Deploy to GitHub Pages

on:
  # Deploy whenever main updates, and allow manual runs from the Actions tab.
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token that lets the deploy job publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer push cancels an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # action-setup reads the pnpm version from package.json "packageManager".
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build (base path = /sudoku/ for the Pages subpath)
        run: pnpm build
        env:
          VITE_BASE: /sudoku/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
